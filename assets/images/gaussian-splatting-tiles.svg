<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9a9a92"/>
    </marker>
  </defs>

  <text x="40" y="34" font-size="14" font-weight="600" fill="#f0eee4">A splat is copied into every tile its bounding box covers</text>

  <!-- tile grid 6x4, cell 48 -->
  <g stroke="#33343b" fill="#111317">
    <rect x="40" y="56" width="48" height="48"/><rect x="88" y="56" width="48" height="48"/><rect x="136" y="56" width="48" height="48"/><rect x="184" y="56" width="48" height="48"/><rect x="232" y="56" width="48" height="48"/><rect x="280" y="56" width="48" height="48"/>
    <rect x="40" y="104" width="48" height="48"/><rect x="88" y="104" width="48" height="48"/><rect x="136" y="104" width="48" height="48"/><rect x="184" y="104" width="48" height="48"/><rect x="232" y="104" width="48" height="48"/><rect x="280" y="104" width="48" height="48"/>
    <rect x="40" y="152" width="48" height="48"/><rect x="88" y="152" width="48" height="48"/><rect x="136" y="152" width="48" height="48"/><rect x="184" y="152" width="48" height="48"/><rect x="232" y="152" width="48" height="48"/><rect x="280" y="152" width="48" height="48"/>
    <rect x="40" y="200" width="48" height="48"/><rect x="88" y="200" width="48" height="48"/><rect x="136" y="200" width="48" height="48"/><rect x="184" y="200" width="48" height="48"/><rect x="232" y="200" width="48" height="48"/><rect x="280" y="200" width="48" height="48"/>
  </g>

  <!-- highlighted tiles the bounding box covers (cols 2,3 x rows 1,2) -->
  <g fill="rgba(0,255,136,0.12)" stroke="#00ff88">
    <rect x="136" y="104" width="48" height="48"/><rect x="184" y="104" width="48" height="48"/>
    <rect x="136" y="152" width="48" height="48"/><rect x="184" y="152" width="48" height="48"/>
  </g>

  <!-- the splat, sized to sit inside the 2x2 footprint -->
  <ellipse cx="184" cy="152" rx="44" ry="30" fill="rgba(255,0,102,0.28)" stroke="#ff0066" stroke-width="2" transform="rotate(-20 184 152)"/>

  <!-- the splat's axis-aligned screen bounding box -->
  <rect x="141" y="120" width="86" height="64" fill="none" stroke="#ff0066" stroke-width="1.5" stroke-dasharray="5 4"/>

  <text x="40" y="270" font-size="12" fill="#9a9a92">Dashed box = the splat's screen bounding box.</text>
  <text x="40" y="288" font-size="12" fill="#9a9a92">It spans 4 tiles, so the splat is copied into all 4.</text>

  <!-- buckets on the right -->
  <text x="470" y="60" font-size="12.5" fill="#9a9a92">duplicated into 4 tile lists:</text>
  <g font-size="12.5" fill="#f0eee4">
    <rect x="470" y="76" width="230" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88"/>
    <text x="484" y="96">copy &#8594; tile (1,2)</text>
    <rect x="470" y="114" width="230" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88"/>
    <text x="484" y="134">copy &#8594; tile (1,3)</text>
    <rect x="470" y="152" width="230" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88"/>
    <text x="484" y="172">copy &#8594; tile (2,2)</text>
    <rect x="470" y="190" width="230" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88"/>
    <text x="484" y="210">copy &#8594; tile (2,3)</text>
  </g>

  <!-- connector -->
  <line x1="232" y1="152" x2="462" y2="148" stroke="#9a9a92" stroke-width="1.5" marker-end="url(#a3)"/>

  <text x="470" y="248" font-size="12" fill="#9a9a92">each tile ends up with a</text>
  <text x="470" y="266" font-size="12" fill="#9a9a92">self-contained, independent list</text>
</svg>
