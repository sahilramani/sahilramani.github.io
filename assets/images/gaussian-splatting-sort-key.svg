<svg viewBox="0 0 760 446" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="60" y="40" font-size="15" font-weight="600" fill="#1e293b">One 64-bit sort key per splat</text>

  <!-- the key bar -->
  <rect x="60" y="60" width="384" height="64" rx="6" fill="#e0f2fe" stroke="#38bdf8"/>
  <rect x="444" y="60" width="256" height="64" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>

  <text x="252" y="90" font-size="15" font-weight="600" fill="#0c4a6e" text-anchor="middle">TILE ID</text>
  <text x="252" y="110" font-size="12" fill="#075985" text-anchor="middle">high bits</text>

  <text x="572" y="90" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">DEPTH</text>
  <text x="572" y="110" font-size="12" fill="#475569" text-anchor="middle">low bits</text>

  <!-- annotations -->
  <line x1="252" y1="135" x2="252" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="252" y="180" font-size="12.5" fill="#475569" text-anchor="middle">groups splats by tile</text>

  <line x1="572" y1="135" x2="572" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="572" y="180" font-size="12.5" fill="#475569" text-anchor="middle">orders them front-to-back</text>

  <!-- ===== before / after the sort ===== -->
  <text x="60" y="224" font-size="13" fill="#64748b">Sort that one flat array, and both fall out at once:</text>

  <!-- BEFORE -->
  <text x="60" y="252" font-size="12.5" font-weight="600" fill="#475569">unsorted keys</text>
  <g font-size="13" font-weight="600">
    <rect x="60"  y="260" width="80" height="34" rx="5" fill="#ede9fe" stroke="#8b5cf6"/><text x="100" y="282" fill="#5b21b6" text-anchor="middle">t3 &#183; 9</text>
    <rect x="148" y="260" width="80" height="34" rx="5" fill="#e0f2fe" stroke="#38bdf8"/><text x="188" y="282" fill="#0c4a6e" text-anchor="middle">t1 &#183; 8</text>
    <rect x="236" y="260" width="80" height="34" rx="5" fill="#ede9fe" stroke="#8b5cf6"/><text x="276" y="282" fill="#5b21b6" text-anchor="middle">t3 &#183; 1</text>
    <rect x="324" y="260" width="80" height="34" rx="5" fill="#fef3c7" stroke="#f59e0b"/><text x="364" y="282" fill="#92400e" text-anchor="middle">t2 &#183; 7</text>
    <rect x="412" y="260" width="80" height="34" rx="5" fill="#e0f2fe" stroke="#38bdf8"/><text x="452" y="282" fill="#0c4a6e" text-anchor="middle">t1 &#183; 2</text>
    <rect x="500" y="260" width="80" height="34" rx="5" fill="#ede9fe" stroke="#8b5cf6"/><text x="540" y="282" fill="#5b21b6" text-anchor="middle">t3 &#183; 4</text>
    <rect x="588" y="260" width="80" height="34" rx="5" fill="#fef3c7" stroke="#f59e0b"/><text x="628" y="282" fill="#92400e" text-anchor="middle">t2 &#183; 3</text>
  </g>

  <!-- arrow -->
  <line x1="364" y1="302" x2="364" y2="328" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="378" y="320" font-size="12.5" fill="#475569">one GPU radix sort</text>

  <!-- AFTER -->
  <text x="60" y="352" font-size="12.5" font-weight="600" fill="#475569">grouped by tile, depth-ordered within</text>
  <g font-size="13" font-weight="600">
    <rect x="60"  y="360" width="80" height="34" rx="5" fill="#e0f2fe" stroke="#38bdf8"/><text x="100" y="382" fill="#0c4a6e" text-anchor="middle">t1 &#183; 2</text>
    <rect x="148" y="360" width="80" height="34" rx="5" fill="#e0f2fe" stroke="#38bdf8"/><text x="188" y="382" fill="#0c4a6e" text-anchor="middle">t1 &#183; 8</text>
    <rect x="236" y="360" width="80" height="34" rx="5" fill="#fef3c7" stroke="#f59e0b"/><text x="276" y="382" fill="#92400e" text-anchor="middle">t2 &#183; 3</text>
    <rect x="324" y="360" width="80" height="34" rx="5" fill="#fef3c7" stroke="#f59e0b"/><text x="364" y="382" fill="#92400e" text-anchor="middle">t2 &#183; 7</text>
    <rect x="412" y="360" width="80" height="34" rx="5" fill="#ede9fe" stroke="#8b5cf6"/><text x="452" y="382" fill="#5b21b6" text-anchor="middle">t3 &#183; 1</text>
    <rect x="500" y="360" width="80" height="34" rx="5" fill="#ede9fe" stroke="#8b5cf6"/><text x="540" y="382" fill="#5b21b6" text-anchor="middle">t3 &#183; 4</text>
    <rect x="588" y="360" width="80" height="34" rx="5" fill="#ede9fe" stroke="#8b5cf6"/><text x="628" y="382" fill="#5b21b6" text-anchor="middle">t3 &#183; 9</text>
  </g>

  <!-- group brackets -->
  <g stroke="#cbd5e1" stroke-width="1.5" fill="none">
    <path d="M60,402 L60,408 L228,408 L228,402"/>
    <path d="M236,402 L236,408 L404,408 L404,402"/>
    <path d="M412,402 L412,408 L668,408 L668,402"/>
  </g>
  <g font-size="12" text-anchor="middle">
    <text x="144" y="426" fill="#0c4a6e">tile 1</text>
    <text x="320" y="426" fill="#92400e">tile 2</text>
    <text x="540" y="426" fill="#5b21b6">tile 3</text>
  </g>
</svg>
