{%- comment -%}
Shared code-block + diagram styling for field layouts.
Usage: {% include code-style.html scope=".post-wrap" %}
`scope` is the prose container selector (.post-wrap for posts, .pj-body for projects).
{%- endcomment -%}
{%- assign s = include.scope -%}
<style>
/* inline code */
{{ s }} code{font-family:var(--mono);font-size:0.9em;background:var(--bg2);border:1px solid var(--line2);padding:1px 6px;color:var(--ink);border-radius:2px}

/* bare fenced block (no language): flat output panel */
{{ s }} pre{background:#0a0a0c;border:1px solid var(--line2);border-radius:6px;padding:18px 20px;margin:28px 0;overflow-x:auto;font-family:var(--mono);font-size:13.5px;line-height:1.7;color:var(--ink2)}

/* fenced code block: terminal-style panel with header bar + syntax palette */
{{ s }} div.highlighter-rouge{position:relative;margin:28px 0;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:#0a0a0c}
{{ s }} div.highlighter-rouge::before{content:'\25CF\2002\25CF\2002\25CF';display:block;height:36px;line-height:36px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--line2);color:#3a3b44;font-size:9px;letter-spacing:0.25em}
{{ s }} div.highlighter-rouge::after{content:'code';position:absolute;top:0;right:16px;height:36px;line-height:36px;font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--g)}
{{ s }} div.language-cpp::after{content:'cpp'}
{{ s }} div.language-c::after{content:'c'}
{{ s }} div.language-glsl::after{content:'glsl'}
{{ s }} div.language-cuda::after{content:'cuda'}
{{ s }} div.language-python::after,{{ s }} div.language-py::after{content:'python'}
{{ s }} div.language-bash::after,{{ s }} div.language-shell::after,{{ s }} div.language-sh::after,{{ s }} div.language-console::after{content:'shell'}
{{ s }} div.language-js::after,{{ s }} div.language-javascript::after{content:'js'}
{{ s }} div.language-json::after{content:'json'}
{{ s }} div.language-yaml::after,{{ s }} div.language-yml::after{content:'yaml'}
{{ s }} div.language-html::after{content:'html'}
{{ s }} div.language-css::after{content:'css'}
{{ s }} div.language-ruby::after,{{ s }} div.language-rb::after{content:'ruby'}
{{ s }} div.language-docker::after,{{ s }} div.language-dockerfile::after{content:'docker'}
{{ s }} div.language-diff::after{content:'diff'}
{{ s }} div.language-ini::after,{{ s }} div.language-toml::after{content:'config'}
{{ s }} div.highlighter-rouge .highlight{background:none;margin:0}
{{ s }} div.highlighter-rouge pre,{{ s }} div.highlighter-rouge pre.highlight{background:none;border:0;border-radius:0;margin:0;padding:18px 20px;overflow-x:auto;font-family:var(--mono);font-size:13.5px;line-height:1.7;color:var(--ink)}
{{ s }} pre code{background:none;border:0;padding:0;font-size:inherit;border-radius:0}

/* rouge token palette (dark) */
{{ s }} .highlight .c,{{ s }} .highlight .c1,{{ s }} .highlight .cm,{{ s }} .highlight .cs,{{ s }} .highlight .cd{color:#6b7280;font-style:italic}
{{ s }} .highlight .cp{color:#8b95a7}
{{ s }} .highlight .k,{{ s }} .highlight .kd,{{ s }} .highlight .kr,{{ s }} .highlight .kc,{{ s }} .highlight .kn,{{ s }} .highlight .kp{color:var(--g);font-weight:500}
{{ s }} .highlight .kt{color:#7fd6ff}
{{ s }} .highlight .nf,{{ s }} .highlight .nd,{{ s }} .highlight .nc,{{ s }} .highlight .nn{color:#e6c07b}
{{ s }} .highlight .nb,{{ s }} .highlight .bp{color:#7fd6ff}
{{ s }} .highlight .nt{color:#7fd6ff}
{{ s }} .highlight .s,{{ s }} .highlight .s1,{{ s }} .highlight .s2,{{ s }} .highlight .se,{{ s }} .highlight .sb,{{ s }} .highlight .sc,{{ s }} .highlight .sd,{{ s }} .highlight .sx,{{ s }} .highlight .sr,{{ s }} .highlight .sh{color:#b7e8a0}
{{ s }} .highlight .mi,{{ s }} .highlight .mf,{{ s }} .highlight .mh,{{ s }} .highlight .mo,{{ s }} .highlight .il{color:var(--m)}
{{ s }} .highlight .o,{{ s }} .highlight .ow{color:#c7c7bf}
{{ s }} .highlight .p{color:#b8b8b0}
{{ s }} .highlight .n,{{ s }} .highlight .na,{{ s }} .highlight .nv,{{ s }} .highlight .nx{color:var(--ink)}
{{ s }} .highlight .gp{color:#6b7280}
{{ s }} .highlight .go{color:#9a9a92}
{{ s }} .highlight .err{color:inherit;background:none}

/* SVG diagrams: panel treatment so light/dark line art stays legible */
{{ s }} img[src$=".svg"]{background:var(--bg2);border-radius:8px;padding:18px 20px}

@media (max-width: 768px){
  {{ s }} pre,{{ s }} div.highlighter-rouge pre,{{ s }} div.highlighter-rouge pre.highlight{font-size:12.5px;padding:14px 16px}
  {{ s }} img[src$=".svg"]{padding:12px}
}
</style>
