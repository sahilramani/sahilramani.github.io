<svg width="100%" viewBox="0 0 680 278" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Opacity distribution of a trained Gaussian scene</title>
  <desc>A histogram of activated opacity over all 741,883 splats of the train scene, 20 bins of width 0.05. The mass piles up against zero: 30% of splats fall in the faintest bin and 67% sit below 0.2, while only 0.2% are near-opaque. Median 0.11, mean 0.19.</desc>
  <style>
    text{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    .t-ink{fill:#1f2937}.t-mut{fill:#64748b}.t-amber{fill:#9a5a1c}
    .s-hair{stroke:#cbd5e1}.k-mark{stroke:#475569}
    .f-bar{fill:#8fbce0}.f-haze{fill:#e7a15a}
    .lbl{font-size:14px}.sm{font-size:12px}.xs{font-size:11px}.b{font-weight:500}
    @media (prefers-color-scheme:dark){
      .t-ink{fill:#e6edf3}.t-mut{fill:#9aa7b4}.t-amber{fill:#e0a05c}
      .s-hair{stroke:#3a4654}.k-mark{stroke:#9aa7b4}
      .f-bar{fill:#3f6f9e}.f-haze{fill:#c98038}
    }
  </style>

  <text x="40" y="26" class="lbl b t-ink">Most of a trained scene is near-transparent haze</text>
  <text x="40" y="46" class="sm t-mut">Activated opacity of all 741,883 splats in the train scene · 20 bins</text>

  <!-- 67%-below-0.2 region tint -->
  <rect x="70" y="70" width="110" height="126" class="f-haze" opacity="0.16"/>

  <!-- median / mean markers -->
  <line x1="131.6" y1="70" x2="131.6" y2="196" class="k-mark" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="172.9" y1="70" x2="172.9" y2="196" class="k-mark" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="128" y="64" class="xs b t-ink" text-anchor="end">median 0.11</text>
  <text x="177" y="64" class="xs b t-ink" text-anchor="start">mean 0.19</text>

  <!-- bars -->
  <rect x="72.75"  y="76.0"  width="22" height="120.0" class="f-bar"/>
  <rect x="100.25" y="126.1" width="22" height="69.9"  class="f-bar"/>
  <rect x="127.75" y="148.5" width="22" height="47.5"  class="f-bar"/>
  <rect x="155.25" y="161.8" width="22" height="34.2"  class="f-bar"/>
  <rect x="182.75" y="169.9" width="22" height="26.1"  class="f-bar"/>
  <rect x="210.25" y="175.6" width="22" height="20.4"  class="f-bar"/>
  <rect x="237.75" y="179.7" width="22" height="16.3"  class="f-bar"/>
  <rect x="265.25" y="182.7" width="22" height="13.3"  class="f-bar"/>
  <rect x="292.75" y="185.1" width="22" height="10.9"  class="f-bar"/>
  <rect x="320.25" y="186.8" width="22" height="9.2"   class="f-bar"/>
  <rect x="347.75" y="188.3" width="22" height="7.7"   class="f-bar"/>
  <rect x="375.25" y="189.7" width="22" height="6.3"   class="f-bar"/>
  <rect x="402.75" y="190.7" width="22" height="5.3"   class="f-bar"/>
  <rect x="430.25" y="191.5" width="22" height="4.5"   class="f-bar"/>
  <rect x="457.75" y="192.2" width="22" height="3.8"   class="f-bar"/>
  <rect x="485.25" y="192.8" width="22" height="3.2"   class="f-bar"/>
  <rect x="512.75" y="193.3" width="22" height="2.7"   class="f-bar"/>
  <rect x="540.25" y="193.9" width="22" height="2.1"   class="f-bar"/>
  <rect x="567.75" y="194.4" width="22" height="1.6"   class="f-bar"/>
  <rect x="595.25" y="195.15" width="22" height="0.85" class="f-bar"/>

  <!-- bar annotations -->
  <text x="83.75" y="70" class="xs t-mut" text-anchor="middle">30%</text>
  <text x="606" y="190" class="xs t-mut" text-anchor="middle">0.2%</text>

  <!-- baseline + x ticks -->
  <line x1="70" y1="196" x2="620" y2="196" class="s-hair" stroke-width="1"/>
  <text x="70"  y="210" class="xs t-mut" text-anchor="middle">0</text>
  <text x="180" y="210" class="xs t-mut" text-anchor="middle">0.2</text>
  <text x="345" y="210" class="xs t-mut" text-anchor="middle">0.5</text>
  <text x="620" y="210" class="xs t-mut" text-anchor="middle">1.0</text>

  <!-- 67% brace -->
  <path d="M70 220 L70 224 L180 224 L180 220" class="k-mark" stroke-width="1" fill="none"/>
  <text x="125" y="240" class="sm b t-amber" text-anchor="middle">67% of splats sit below 0.2</text>

  <text x="40" y="266" class="sm t-mut">A blind stride keeps these in proportion and spends the budget on fog; importance keeps the opaque surfaces.</text>
</svg>
