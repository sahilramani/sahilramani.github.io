# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Random Access Memories
email: sahilramani@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Software engineer at NVIDIA working on AI for game development. Notes on graphics,
  machine learning, and the seam where they meet - plus the occasional detour into
  gaming, photography, and life with two dogs.
url: "https://www.sahilramani.com"
twitter_username: sahilramani
github_username: sahilramani
# used by jekyll-seo-tag for twitter:site / twitter:creator cards
twitter:
  username: sahilramani
logo: "/assets/images/apple-touch-icon.png"  # jekyll-seo-tag publisher logo (JSON-LD)

# Build settings
# No `theme:`/`remote_theme:` on purpose - "field" is this repo's own theme
# (_layouts/field*.html, _sass/field/, assets/js/). GitHub Pages injects
# jekyll-theme-primer as a default when no theme is set; it's inert because
# every page uses a local layout and nothing links its CSS.
markdown: kramdown
sass:
  style: expanded  # ruby-sass 3.x `compressed` mangles CSS custom properties; keep expanded
# Outputting
permalink: /:year/:month/:title/
paginate: 10 # amount of posts to show
paginate_path: /page:num/
timezone: America/Los_Angeles # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages
  - .well-known

# Exclude from processing. Setting `exclude` replaces Jekyll's defaults,
# so the default entries are repeated here alongside the repo-only files.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - CLAUDE.md
  - README.md

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-seo-tag

# Analytics
analytics:
  provider               : "google-gtag" # false (default), "google", "google-universal", "google-gtag", "custom"
  google:
    tracking_id          : "G-RB5EEN63Q9"
    anonymize_ip         : true # true, false (default)

# Comments
comments:
  provider: "disqus"
  disqus:
    shortname: "sahilramani"

# used by layouts ({{ site.author.name }}) and jekyll-seo-tag
author:
  name   : "Sahil Ramani"

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  # default social-share image for everything (jekyll-seo-tag og:image);
  # individual pages/posts can override with their own `image:` front matter
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: field-post
      comments: true
  # _projects
  - scope:
      path: ""
      type: projects
    values:
      layout: field-project

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
year_archive:
  type: liquid
  path: /posts/
resume:
  type: liquid
  path: /resume/
