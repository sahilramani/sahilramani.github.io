<svg viewBox="0 0 820 234" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7a7a72"/>
    </marker>
  </defs>

  <text x="40" y="26" font-size="13" fill="#9a9a92">Input: millions of 3D Gaussians</text>

  <!-- Stage 1 -->
  <rect x="40" y="50" width="150" height="92" rx="10" fill="#14161b" stroke="#33343b"/>
  <circle cx="62" cy="72" r="11" fill="#2f3038"/>
  <text x="62" y="76" font-size="12" fill="#f0eee4" text-anchor="middle">1</text>
  <text x="82" y="76" font-size="15" font-weight="600" fill="#f0eee4">Cull &amp; Project</text>
  <text x="56" y="103" font-size="11.5" fill="#9a9a92">drop off-screen</text>
  <text x="56" y="120" font-size="11.5" fill="#9a9a92">Gaussians, flatten</text>
  <text x="56" y="137" font-size="11.5" fill="#9a9a92">3D &#8594; 2D ellipses</text>

  <!-- Stage 2 -->
  <rect x="240" y="50" width="150" height="92" rx="10" fill="#14161b" stroke="#33343b"/>
  <circle cx="262" cy="72" r="11" fill="#2f3038"/>
  <text x="262" y="76" font-size="12" fill="#f0eee4" text-anchor="middle">2</text>
  <text x="282" y="76" font-size="15" font-weight="600" fill="#f0eee4">Tile</text>
  <text x="256" y="103" font-size="11.5" fill="#9a9a92">split screen into</text>
  <text x="256" y="120" font-size="11.5" fill="#9a9a92">16&#215;16 tiles, copy</text>
  <text x="256" y="137" font-size="11.5" fill="#9a9a92">splats per tile</text>

  <!-- Stage 3 (accent) -->
  <rect x="440" y="50" width="150" height="92" rx="10" fill="rgba(0,255,136,0.10)" stroke="#00ff88"/>
  <circle cx="462" cy="72" r="11" fill="#00ff88"/>
  <text x="462" y="76" font-size="12" fill="#000" text-anchor="middle">3</text>
  <text x="482" y="76" font-size="15" font-weight="600" fill="#00ff88">Sort once</text>
  <text x="456" y="103" font-size="11.5" fill="#8fd9b3">one GPU radix</text>
  <text x="456" y="120" font-size="11.5" fill="#8fd9b3">sort across the</text>
  <text x="456" y="137" font-size="11.5" fill="#8fd9b3">whole frame</text>

  <!-- Stage 4 -->
  <rect x="640" y="50" width="150" height="92" rx="10" fill="#14161b" stroke="#33343b"/>
  <circle cx="662" cy="72" r="11" fill="#2f3038"/>
  <text x="662" y="76" font-size="12" fill="#f0eee4" text-anchor="middle">4</text>
  <text x="682" y="76" font-size="15" font-weight="600" fill="#f0eee4">Blend</text>
  <text x="656" y="103" font-size="11.5" fill="#9a9a92">alpha-composite</text>
  <text x="656" y="120" font-size="11.5" fill="#9a9a92">front-to-back,</text>
  <text x="656" y="137" font-size="11.5" fill="#9a9a92">stop early</text>

  <!-- arrows between stages -->
  <line x1="195" y1="96" x2="233" y2="96" stroke="#7a7a72" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="395" y1="96" x2="433" y2="96" stroke="#7a7a72" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="595" y1="96" x2="633" y2="96" stroke="#7a7a72" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== data-shape glyphs under each stage ===== -->
  <!-- 1: scattered 2D splats (ellipses) -->
  <g>
    <ellipse cx="103" cy="176" rx="8" ry="4" fill="#6a6a64" transform="rotate(-25 103 176)"/>
    <ellipse cx="124" cy="180" rx="8" ry="4" fill="#48484f" transform="rotate(20 124 180)"/>
    <ellipse cx="116" cy="168" rx="7" ry="3.5" fill="#6a6a64" transform="rotate(-5 116 168)"/>
  </g>
  <text x="115" y="200" font-size="10" fill="#7a7a72" text-anchor="middle">2D splats</text>

  <!-- 2: tile grid -->
  <g stroke="#6a6a64" fill="none">
    <rect x="302" y="162" width="9" height="9"/><rect x="311" y="162" width="9" height="9"/><rect x="320" y="162" width="9" height="9"/>
    <rect x="302" y="171" width="9" height="9"/><rect x="311" y="171" width="9" height="9"/><rect x="320" y="171" width="9" height="9"/>
    <rect x="302" y="180" width="9" height="9"/><rect x="311" y="180" width="9" height="9"/><rect x="320" y="180" width="9" height="9"/>
  </g>
  <text x="315" y="200" font-size="10" fill="#7a7a72" text-anchor="middle">tiled lists</text>

  <!-- 3: one sorted, grouped array -->
  <g stroke="#0d0d10" stroke-width="0.75">
    <rect x="485" y="168" width="16" height="12" fill="rgba(0,255,136,0.55)"/>
    <rect x="501" y="168" width="20" height="12" fill="rgba(255,180,84,0.55)"/>
    <rect x="521" y="168" width="24" height="12" fill="rgba(255,0,102,0.55)"/>
  </g>
  <text x="515" y="200" font-size="10" fill="#7a7a72" text-anchor="middle">sorted array</text>

  <!-- 4: composited pixels -->
  <rect x="697" y="162" width="36" height="20" rx="3" fill="#14161b" stroke="#6a6a64"/>
  <circle cx="709" cy="173" r="7" fill="rgba(0,255,136,0.45)"/>
  <circle cx="718" cy="170" r="7" fill="rgba(255,180,84,0.45)"/>
  <circle cx="722" cy="176" r="7" fill="rgba(255,0,102,0.45)"/>
  <text x="715" y="200" font-size="10" fill="#7a7a72" text-anchor="middle">pixels</text>

  <text x="790" y="224" font-size="13" fill="#9a9a92" text-anchor="end">Output: rendered frame &#8594;</text>
</svg>
